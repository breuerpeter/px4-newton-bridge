ci:
  autofix_commit_msg: |
    [pre-commit.ci] auto code formatting
  autofix_prs: false
  autoupdate_schedule: quarterly
  submodules: false
  # pre-commit.ci has no network access, but uv-lock needs to resolve
  # dependencies from remote indexes (PyPI, nvidia).
  # Lockfile freshness is checked by a separate CI workflow instead.
  skip:
    - uv-lock

# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Ruff version.
    rev: v0.15.9
    hooks:
      # Run the linter.
      - id: ruff
        args: [--fix] # Apply fixes to resolve lint violations.
      # Run the formatter.
      - id: ruff-format
  - repo: https://github.com/astral-sh/uv-pre-commit
    # uv version.
    rev: 0.11.3
    hooks:
      # Update the uv lockfile
      - id: uv-lock
  - repo: https://github.com/crate-ci/typos
    rev: v1
    hooks:
      - id: typos
        args: []
        exclude: \.(js|css)$
  # Enforce conventional commit messages
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.4.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: [--force-scope]
