site_name: PX4-Newton Bridge
site_description: PX4 SITL bridge for the Newton physics engine
repo_url: https://github.com/breuerpeter/px4-newton-bridge

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - navigation.sections

markdown_extensions:
  - admonition
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

extra_javascript:
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Home: index.md
  - Getting Started:
      - Docker: getting-started/docker.md
      - Local: getting-started/local.md
  - Vehicles: vehicles.md
  - Conventions: conventions.md
  - Contributing:
      - Development: contributing/development.md
      - Documentation: contributing/docs.md
