builder: urdf

motor:
  max_thrust: 50.0    # per motor [N]
  torque_coeff: 0.05  # N·m per N reaction torque
  spin_dirs: [1, -1, 1, -1]  # CCW=1, CW=-1 (viewed from above)

camera:
  width: 320           # [px]
  height: 240          # [px]
  fov: 90              # vertical field of view [deg]
  rate: 30             # render rate [Hz]
  # Position relative to body_frd origin [m] (FRD body frame)
  position: [0.0, 0.0, 0.05]
  # Orientation: camera looks down (body Z+ in FRD = nadir)
  # Camera convention: -Z is viewing direction, Y is down in image
  # Identity quat means camera looks along body -Z (up in FRD) so we
  # rotate 180° around X to point along body +Z (down / nadir).
  orientation_rpy: [180, 0, 0]  # [deg] roll, pitch, yaw
